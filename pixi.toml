[workspace]
name = "claude-code-primer"
version = "0.1.0"
description = "Claude Code Primer — documentation and example projects"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
git-cliff = ">=2.0"
gh = ">=2.94.0,<3"

[tasks]
changelog = { cmd = "git-cliff --tag \"$(date +%Y-%m-%d)\" -o CHANGELOG.md", description = "Regenerate CHANGELOG.md" }
