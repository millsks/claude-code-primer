name: data-wrangler
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  # --- runtime ---
  - numpy>=2.0
  - pandas>=2.2
  - scipy>=1.13
  - pyarrow>=16.0
  - openpyxl>=3.1
  - structlog>=24.0
  # --- dev tooling ---
  - pytest>=8.0
  - pytest-cov>=5.0
  - mypy>=1.10
  - ruff>=0.4
  - pre-commit>=3.7
  - build>=1.2
  # type stubs
  - pandas-stubs>=2.2
  - numpy<2,>=1  # conda-forge stubs need numpy installed first
  - pip
  - pip:
    - -e .
