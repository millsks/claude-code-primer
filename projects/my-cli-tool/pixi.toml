[workspace]
name = "logwatch"
version = "0.1.0"
description = "Monitor log files for patterns with real-time tail and colored output"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.12,<3.13"
click = ">=8.1"
rich = ">=13.7"

[pypi-dependencies]
logwatch = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.2"
pytest-cov = ">=5.0"
ruff = ">=0.5"
mypy = ">=1.10"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
test      = { cmd = "pytest",                                               description = "Run the test suite"                  }
cov       = { cmd = "pytest --cov=src/logwatch --cov-report=term-missing", description = "Run tests with coverage"             }
lint      = { cmd = "ruff check .",                                         description = "Lint source code"                    }
fmt       = { cmd = "ruff format .",                                        description = "Format source code"                  }
check     = { cmd = "mypy src/logwatch",                                    description = "Type-check source"                   }
watch     = { cmd = "logwatch",                                             description = "Run logwatch (append args after --)" }
ci        = { depends-on = ["cov", "check", "lint"],                        description = "Full validation sequence"            }
