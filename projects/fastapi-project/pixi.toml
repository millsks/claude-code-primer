[workspace]
authors = ["Kevin Mills <millsks@gmail.com>"]
channels = ["conda-forge"]
name = "fastapi-project"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<3.15"
fastapi = ">=0.111"
sqlalchemy = ">=2.0"
asyncpg = ">=0.29"
alembic = ">=1.13"
pydantic = ">=2.0"
uvicorn = ">=0.29"
structlog = ">=24.0"

[pypi-dependencies]
fastapi-project = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"
pytest-asyncio = ">=0.23"
mypy = ">=1.10"
ruff = ">=0.4"
pre-commit = ">=3.7"
git-cliff = ">=2.0"
httpx = ">=0.27"

[feature.dev.pypi-dependencies]
hatchling = ">=1.24"
fastapi-project = { path = ".", editable = true }

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
bootstrap = "pre-commit install --install-hooks"
fmt = "ruff format ."
lint = "ruff check ."
check = "mypy src/"
test = "pytest tests/unit/"
test-integration = "pytest tests/integration/"
cov = "pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80"
build = "python -m build"
changelog = "git cliff -o CHANGELOG.md"
dev = "uvicorn fastapi_project.main:app --reload --port 8000"
migrate = "alembic upgrade head"
migration = "alembic revision --autogenerate -m"

[tasks.ci]
depends-on = ["fmt", "lint", "check", "cov"]
