[workspace]
name = "skills-work"
version = "0.1.0"
description = "Skills work demo project"
authors = ["Kevin Mills <millsks@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.12,<3.15"
structlog = ">=24.0"

[pypi-dependencies]
skills-work = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"
mypy = ">=1.10"
ruff = ">=0.4"
pre-commit = ">=3.7"
git-cliff = ">=2.0"

[feature.dev.pypi-dependencies]
hatchling = ">=1.24"
skills-work = { path = ".", editable = true }

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
bootstrap = "pre-commit install --install-hooks"
fmt = "ruff format ."
lint = "ruff check ."
check = "mypy src/"
test = "pytest tests/unit/"
test-integration = "pytest tests/integration/"
cov = "pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=90"
build = "python -m build"
changelog = "git cliff -o CHANGELOG.md"

[tasks.ci]
depends-on = ["fmt", "lint", "check", "cov"]
